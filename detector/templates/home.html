<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Emotion Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center">

        <h1 class="display-4">

            Emotion Detection System

        </h1>

        <p class="lead">

            AI Powered Facial Emotion Recognition

        </p>

    </div>

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>Upload Image</h3>

                    <p>Predict emotion from a face image.</p>

                    <a href="{% url 'upload' %}" class="btn btn-primary">

                        Upload Image

                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>Live Webcam</h3>

                    <p>Real-time emotion detection.</p>

                        <a href="{% url 'webcam' %}" class="btn btn-success">
                            Live Webcam
                        </a>


                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
